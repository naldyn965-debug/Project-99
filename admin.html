<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم نبتيكس أكاديمي</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070e09;--surface:#0c1510;--card:#111d14;--card-hov:#162219;
  --border:rgba(34,197,94,.09);--border-md:rgba(34,197,94,.2);
  --emerald:#22c55e;--glow:rgba(34,197,94,.18);
  --pending:#f59e0b;--pending-bg:rgba(245,158,11,.08);
  --approved:#22c55e;--approved-bg:rgba(34,197,94,.08);
  --rejected:#ef4444;--rejected-bg:rgba(239,68,68,.08);
  --text:#dbeade;--muted:#5a8068;--subtle:#2c4235;
  --r:16px;--t:.22s cubic-bezier(.4,0,.2,1);}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;
  background-image:radial-gradient(rgba(34,197,94,.035) 1px,transparent 1px);
  background-size:30px 30px;pointer-events:none;z-index:0}
#auth-screen{display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:24px;position:relative;z-index:1}
#auth-screen::after{content:'';position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);width:700px;height:700px;
  background:radial-gradient(circle,rgba(34,197,94,.055) 0%,transparent 65%);pointer-events:none}
.auth-card{background:var(--card);border:1px solid var(--border-md);border-radius:24px;
  padding:44px 40px;width:100%;max-width:420px;position:relative;overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.04);
  animation:fadeUp .5s var(--t) both}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(34,197,94,.45),transparent)}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo-ico{display:flex;justify-content:center;margin-bottom:14px}
.auth-logo-ico svg{filter:drop-shadow(0 0 14px rgba(34,197,94,.4))}
.auth-logo-title{font-size:1.45rem;font-weight:900;letter-spacing:-.02em}
.auth-logo-sub{font-size:12.5px;color:var(--muted);margin-top:5px}
.auth-label{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:7px;
  display:block;letter-spacing:.05em;text-transform:uppercase}
.auth-input{width:100%;padding:13px 16px;background:rgba(255,255,255,.03);
  border:1px solid var(--border-md);border-radius:12px;font-size:14px;
  font-family:inherit;direction:rtl;outline:none;color:var(--text);
  transition:border-color var(--t),box-shadow var(--t);margin-bottom:14px}
.auth-input:focus{border-color:var(--emerald);box-shadow:0 0 0 3px rgba(34,197,94,.12)}
.auth-btn{width:100%;padding:14px;border-radius:12px;background:var(--emerald);
  border:none;color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;
  transition:all var(--t);box-shadow:0 4px 20px rgba(34,197,94,.3);margin-top:4px}
.auth-btn:hover{background:#16a34a;box-shadow:0 6px 28px rgba(34,197,94,.45);transform:translateY(-1px)}
.auth-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.auth-err{font-size:12.5px;color:var(--rejected);text-align:center;margin-top:12px;min-height:18px}
.google-btn{display:flex;align-items:center;justify-content:center;gap:8px;
  background:rgba(255,255,255,.04);border:1px solid var(--border-md);color:var(--text);
  font-size:14px;font-weight:700;padding:13px;border-radius:12px;cursor:pointer;
  font-family:inherit;transition:all var(--t);width:100%;margin-top:4px}
.google-btn:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15)}
#app-screen{display:none;min-height:100vh;position:relative;z-index:1}
.app-layout{display:grid;grid-template-columns:282px 1fr;min-height:100vh}
.sidebar{background:linear-gradient(170deg,#091409 0%,#060f08 55%,#050c06 100%);
  border-left:1px solid var(--border);color:var(--text);
  display:flex;flex-direction:column;position:relative;overflow:hidden}
.sidebar::before{content:'';position:absolute;top:-80px;right:-80px;width:340px;height:340px;
  background:radial-gradient(circle,rgba(34,197,94,.07) 0%,transparent 65%);
  pointer-events:none;animation:ambientShift 9s ease-in-out infinite alternate}
@keyframes ambientShift{0%{transform:translate(0,0)}100%{transform:translate(16px,18px) scale(1.08)}}
.sidebar-head{padding:26px 22px 22px;border-bottom:1px solid var(--border);position:relative}
.sidebar-logo-icon{display:flex;align-items:center;gap:10px;margin-bottom:2px}
.sidebar-logo-svg{filter:drop-shadow(0 0 8px rgba(34,197,94,.35))}
.sidebar-logo-name{font-size:1rem;font-weight:900;letter-spacing:-.01em}
.sidebar-logo-sub{font-size:11px;color:var(--muted);margin-top:3px;margin-right:36px}
.sidebar-section-label{font-size:10px;font-weight:800;color:var(--subtle);
  text-transform:uppercase;letter-spacing:.1em;padding:18px 22px 8px}
.sidebar-stats{padding:0 14px 4px;display:flex;flex-direction:column;gap:7px}
.stat-card{border-radius:13px;padding:13px 14px;display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,.025);border:1px solid var(--border);transition:all var(--t)}
.stat-card:hover{border-color:var(--border-md);background:rgba(255,255,255,.045)}
.stat-icon{width:36px;height:36px;border-radius:9px;display:flex;
  align-items:center;justify-content:center;flex-shrink:0}
.stat-card.pending  .stat-icon{background:rgba(245,158,11,.12);color:#f59e0b}
.stat-card.approved .stat-icon{background:rgba(34,197,94,.12); color:#22c55e}
.stat-card.rejected .stat-icon{background:rgba(239,68,68,.12); color:#ef4444}
.stat-card.revenue  .stat-icon{background:rgba(168,85,247,.12);color:#a855f7}
.stat-info{flex:1;min-width:0}
.stat-val{font-size:1.45rem;font-weight:900;line-height:1;letter-spacing:-.02em}
.stat-card.pending  .stat-val{color:#fbbf24}
.stat-card.approved .stat-val{color:#4ade80}
.stat-card.rejected .stat-val{color:#f87171}
.stat-card.revenue  .stat-val{color:#c084fc}
.stat-lbl{font-size:10.5px;color:var(--muted);margin-top:3px}
.sidebar-courses{padding:0 14px 12px}
.courses-heading{font-size:10px;font-weight:800;color:var(--subtle);
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;padding:16px 8px 8px}
.course-enroll-row{background:rgba(255,255,255,.022);border:1px solid var(--border);
  border-radius:11px;padding:11px 12px;margin-bottom:6px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;transition:all var(--t)}
.course-enroll-row:hover{background:rgba(255,255,255,.05);border-color:var(--border-md)}
.course-enroll-row.paused-course{border-color:rgba(239,68,68,.18);background:rgba(239,68,68,.025)}
.course-enroll-name{font-size:11px;opacity:.85;line-height:1.4}
.course-enroll-pending{font-size:10px;color:var(--muted);margin-top:2px}
.course-enroll-count{font-size:1.3rem;font-weight:900;color:#4ade80;
  flex-shrink:0;min-width:26px;text-align:center;letter-spacing:-.02em}
.course-toggle-btn{font-size:10px;padding:4px 8px;border-radius:6px;border:none;
  cursor:pointer;font-family:inherit;font-weight:700;margin-top:4px;width:100%;
  transition:all var(--t);display:flex;align-items:center;justify-content:center;gap:4px}
.course-toggle-btn svg{width:9px;height:9px;flex-shrink:0}
.course-toggle-btn.active{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.course-toggle-btn.active:hover{background:rgba(239,68,68,.1);color:#f87171;border-color:rgba(239,68,68,.25)}
.course-toggle-btn.paused{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.course-toggle-btn.paused:hover{background:rgba(34,197,94,.1);color:#4ade80;border-color:rgba(34,197,94,.25)}
.live-dot{display:inline-block;width:6px;height:6px;background:#4ade80;border-radius:50%;
  margin-left:5px;vertical-align:middle;animation:livePulse 1.6s ease-in-out infinite}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.65)}}
.sidebar-footer{margin-top:auto;padding:14px 14px 18px;border-top:1px solid var(--border)}
.sidebar-user-badge{display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:10px;background:rgba(255,255,255,.025);border:1px solid var(--border);margin-bottom:9px}
.sidebar-user-avatar{width:30px;height:30px;border-radius:50%;
  background:rgba(34,197,94,.1);border:1px solid var(--border-md);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--emerald)}
.sidebar-user-avatar svg{width:15px;height:15px}
.sidebar-user{font-size:11px;color:var(--muted);word-break:break-all;flex:1}
.logout-btn{width:100%;padding:10px 14px;border-radius:10px;
  background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.14);color:#f87171;
  font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:all var(--t);display:flex;align-items:center;justify-content:center;gap:7px}
.logout-btn:hover{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.28)}
.logout-btn svg{width:15px;height:15px}
.main-content{padding:28px 30px;overflow-y:auto}
.main-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.main-title{font-size:1.3rem;font-weight:900;letter-spacing:-.02em}
.main-subtitle{font-size:12px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:5px}
.refresh-btn{display:flex;align-items:center;gap:7px;padding:10px 18px;border-radius:10px;
  background:var(--card);border:1px solid var(--border);color:var(--text);
  font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:all var(--t);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.refresh-btn:hover{background:var(--card-hov);border-color:var(--border-md)}
.refresh-btn:hover .ricon{transform:rotate(-40deg)}
.ricon{transition:transform .4s var(--t);display:flex;align-items:center}
.refresh-btn svg,.logout-btn svg{display:block}
.controls-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.tabs{display:flex;gap:4px;background:var(--card);border-radius:12px;
  padding:5px;border:1px solid var(--border)}
.tab-btn{padding:7px 16px;border-radius:8px;border:none;background:transparent;
  font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;
  transition:all var(--t);white-space:nowrap}
.tab-btn.active{background:var(--emerald);color:#fff;box-shadow:0 2px 10px rgba(34,197,94,.35)}
.search-wrap{flex:1;min-width:200px}
.search-input{width:100%;padding:10px 14px;background:var(--card);
  border:1px solid var(--border);border-radius:10px;font-size:13px;
  font-family:inherit;direction:rtl;outline:none;color:var(--text);transition:all var(--t)}
.search-input:focus{border-color:var(--emerald);box-shadow:0 0 0 3px rgba(34,197,94,.1)}
.search-input::placeholder{color:var(--subtle)}
.payments-list{display:flex;flex-direction:column;gap:10px}
.pay-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:20px 22px;border-right:3px solid transparent;
  transition:all var(--t);animation:cardIn .32s var(--t) both;position:relative;overflow:hidden}
.pay-card:hover{background:var(--card-hov);border-color:var(--border-md);
  transform:translateY(-1px);box-shadow:0 8px 28px rgba(0,0,0,.4)}
.pay-card.pending {border-right-color:var(--pending)}
.pay-card.approved{border-right-color:var(--approved)}
.pay-card.rejected{border-right-color:var(--rejected)}
.pay-card:nth-child(1){animation-delay:.03s}
.pay-card:nth-child(2){animation-delay:.07s}
.pay-card:nth-child(3){animation-delay:.11s}
.pay-card:nth-child(4){animation-delay:.15s}
.pay-card:nth-child(n+5){animation-delay:.19s}
.pay-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
.pay-email{font-size:14px;font-weight:800;margin-bottom:3px}
.pay-date{font-size:11.5px;color:var(--subtle)}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;
  border-radius:30px;font-size:11.5px;font-weight:800;white-space:nowrap;flex-shrink:0}
.status-badge.pending {background:var(--pending-bg); color:var(--pending); border:1px solid rgba(245,158,11,.2)}
.status-badge.approved{background:var(--approved-bg);color:var(--approved);border:1px solid rgba(34,197,94,.2)}
.status-badge.rejected{background:var(--rejected-bg);color:var(--rejected);border:1px solid rgba(239,68,68,.2)}
.pay-card-details{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:8px;margin-bottom:16px}
.detail-item{background:rgba(255,255,255,.02);border:1px solid var(--border);
  border-radius:10px;padding:10px 12px;transition:border-color var(--t)}
.detail-item:hover{border-color:var(--border-md)}
.detail-lbl{font-size:10px;color:var(--subtle);font-weight:700;margin-bottom:4px;
  text-transform:uppercase;letter-spacing:.04em}
.detail-val{font-size:13px;font-weight:800;word-break:break-all}
.detail-val.phone-val{direction:ltr;text-align:right}
.pay-card-actions{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.action-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;
  border-radius:9px;border:none;font-size:12.5px;font-weight:700;cursor:pointer;
  font-family:inherit;transition:all var(--t);white-space:nowrap;text-decoration:none}
.btn-icon{width:13px;height:13px;flex-shrink:0;display:block}
.action-btn.approve  {background:rgba(34,197,94,.14);color:#4ade80;border:1px solid rgba(34,197,94,.24)}
.action-btn.approve:hover{background:var(--emerald);color:#fff;box-shadow:0 4px 16px rgba(34,197,94,.35);transform:translateY(-1px)}
.action-btn.reject   {background:rgba(239,68,68,.08);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.action-btn.reject:hover {background:rgba(239,68,68,.2);border-color:rgba(239,68,68,.4)}
.action-btn.wa       {background:rgba(37,211,102,.1);color:#25d366;border:1px solid rgba(37,211,102,.2)}
.action-btn.wa:hover {background:#25d366;color:#fff}
.action-btn.delete   {background:rgba(239,68,68,.06);color:#f87171;border:1px solid rgba(239,68,68,.15)}
.action-btn.delete:hover  {background:rgba(239,68,68,.16);border-color:rgba(239,68,68,.35)}
.action-btn.suspend  {background:rgba(245,158,11,.08);color:#fbbf24;border:1px solid rgba(245,158,11,.18)}
.action-btn.suspend:hover {background:rgba(245,158,11,.18);border-color:rgba(245,158,11,.35)}
.action-btn.unsuspend{background:rgba(34,197,94,.08);color:#4ade80;border:1px solid rgba(34,197,94,.18)}
.action-btn.unsuspend:hover{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.35)}
.action-btn:disabled {opacity:.4;cursor:not-allowed;transform:none!important}
.action-done{font-size:12px;color:var(--muted);padding:8px 0}
.empty-state{text-align:center;padding:60px 24px;color:var(--muted)}
.empty-ico{margin:0 auto 16px;opacity:.3}
.empty-title{font-size:1rem;font-weight:800;color:var(--text);margin-bottom:8px}
.empty-desc{font-size:13px;line-height:1.7}
.loading-state{text-align:center;padding:60px 24px;color:var(--muted)}
.spinner{width:34px;height:34px;border:2px solid var(--border);border-top-color:var(--emerald);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast-wrap{position:fixed;top:20px;left:50%;transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:12px 22px;border-radius:12px;font-size:13px;font-weight:700;white-space:nowrap;
  animation:toastIn .28s var(--t);pointer-events:auto;backdrop-filter:blur(12px);
  box-shadow:0 8px 28px rgba(0,0,0,.5)}
.toast.ok {background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#4ade80}
.toast.err{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#f87171}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.confirm-overlay{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.72);
  backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:20px}
.confirm-overlay.on{display:flex;animation:fadeIn .2s ease}
.confirm-box{background:var(--card);border:1px solid var(--border-md);border-radius:22px;
  padding:32px 28px;max-width:380px;width:100%;text-align:center;
  box-shadow:0 32px 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.04);
  animation:confirmIn .28s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden}
.confirm-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(34,197,94,.25),transparent)}
.confirm-ico{font-size:42px;margin-bottom:14px;display:block}
.confirm-title{font-size:1.05rem;font-weight:900;margin-bottom:10px;letter-spacing:-.01em}
.confirm-msg{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:22px}
.confirm-actions{display:flex;gap:8px;justify-content:center}
.confirm-btn{padding:11px 26px;border-radius:11px;border:none;font-size:14px;font-weight:800;
  cursor:pointer;font-family:inherit;transition:all var(--t)}
.confirm-btn.ok{background:var(--rejected);color:#fff;box-shadow:0 3px 12px rgba(239,68,68,.3)}
.confirm-btn.ok:hover{box-shadow:0 6px 20px rgba(239,68,68,.45);transform:translateY(-1px)}
.confirm-btn.cancel{background:rgba(255,255,255,.05);color:var(--text);border:1px solid var(--border-md)}
.confirm-btn.cancel:hover{background:rgba(255,255,255,.09)}
.confirm-note{width:100%;padding:10px 13px;background:rgba(255,255,255,.03);
  border:1px solid var(--border-md);border-radius:10px;font-size:13px;font-family:inherit;
  direction:rtl;outline:none;color:var(--text);resize:none;margin-bottom:14px;
  transition:border-color var(--t)}
.confirm-note:focus{border-color:var(--emerald)}
@keyframes fadeUp  {from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn  {from{opacity:0}to{opacity:1}}
@keyframes cardIn  {from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes confirmIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}

/* ── Daily Summary Panel ──────────────── */
.day-summary-card{background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.15);
  border-radius:14px;padding:16px 18px;margin-bottom:14px;animation:fadeUp .25s var(--t)}
.day-summary-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;direction:rtl}
.day-summary-header svg{color:#4ade80;flex-shrink:0;width:16px;height:16px}
.day-summary-title-txt{font-size:14px;font-weight:900;color:var(--text)}
.day-summary-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(88px,1fr));gap:8px}
.day-stat{background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:10px;padding:11px 10px;text-align:center}
.day-stat-val{font-size:1.3rem;font-weight:900;letter-spacing:-.02em;color:var(--text);line-height:1}
.day-stat-lbl{font-size:10px;color:var(--muted);margin-top:5px}
.day-stat.approved-s .day-stat-val{color:#4ade80}
.day-stat.pending-s  .day-stat-val{color:#fbbf24}
.day-stat.rejected-s .day-stat-val{color:#f87171}
.day-stat.revenue-s{border-color:rgba(168,85,247,.2);background:rgba(168,85,247,.04)}
.day-stat.revenue-s  .day-stat-val{color:#c084fc}
@media(max-width:768px){.app-layout{grid-template-columns:1fr}.sidebar{display:none}.main-content{padding:16px}}
/* ── Date Navigator ─────────────────────────────── */
.date-nav-wrap{overflow-x:auto;margin-bottom:10px;padding:2px 0 6px;
  scrollbar-width:none;-ms-overflow-style:none;
  direction:ltr;                   /* force LTR so today is on right */
  -webkit-overflow-scrolling:touch; /* smooth momentum on iOS */
  touch-action:pan-x}             /* only horizontal pan — no accidental vertical scroll */
.date-nav-wrap::-webkit-scrollbar{display:none}
.date-nav{display:flex;gap:6px;min-width:max-content;direction:ltr}
.day-btn{touch-action:manipulation} /* suppress 300ms tap delay */
.day-btn{display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:9px 10px;border-radius:11px;border:1px solid var(--border);
  background:var(--card);cursor:pointer;font-family:inherit;color:var(--text);
  min-width:52px;transition:all var(--t);position:relative}
.day-btn:hover{border-color:var(--border-md);background:var(--card-hov);transform:translateY(-1px)}

<script>
'use strict';

/* ── Firebase Init ─────────────────────────────── */
const firebaseConfig = {

const auth = firebase.auth();
const db   = firebase.firestore();

const IC = {
  check:  '<svg class="btn-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 10 8 14 16 6"/></svg>',

  circ_g: '<svg class="btn-icon" viewBox="0 0 20 20" fill="#4ade80"><circle cx="10" cy="10" r="8"/></svg>',
  circ_r: '<svg class="btn-icon" viewBox="0 0 20 20" fill="#f87171"><circle cx="10" cy="10" r="8"/></svg>',
};
/* ── State ──────────────────────────────────────── */
let allPayments = [];
let currentFilter = 'pending';
let pendingAction = null; // {type:'approve'|'reject', docId, uid, courseId}
let paymentsUnsubscribe  = null; // real-time listener teardown
let studyingUnsubscribe  = null; // academy_progress listener teardown
let studyingCounts       = {};   // { courseId: { uid: true } } — from academy_progress
let paidCounts           = {};   // { courseId: { uid: true } } — from users.paidCourses
let usersUnsubscribe     = null; // users collection listener teardown
let courseConfig         = {};   // { courseId: { active: bool } }
let currentDateFilter    = null;  // Date | null — set by day navigator
let courseConfigUnsubscribe = null;

const COURSE_LABELS = {
  'pest':             'مكافحة الآفات الزراعية',
  'mol-bio':          'تقنيات البيولوجيا الجزيئية',
  'food-quality':     'جودة وسلامة الغذاء',
  'ag-english':       'الإنجليزية الزراعية',
  'food-safety':      'سلامة الغذاء',
  'land-reclamation': 'استصلاح الأراضي'
};

/* ── Auth ───────────────────────────────────────── */
auth.onAuthStateChanged(async function(user) {
  if (!user) { showAuth(); return; }
  // Verify admin
  // ─ Admin UIDs — أضف UID بتاعك هنا ─
  const ADMIN_UIDS = ['A5nXSIE1tchI13KemZT6grAnxWN2'];
  if (!ADMIN_UIDS.includes(user.uid)) {
    showToast('ليس لديك صلاحية الوصول لهذه الصفحة', 'err');
    await auth.signOut();
    showAuth();
    return;
  }
  document.getElementById('sidebar-user-email').textContent = user.email;
  showApp();
  loadPayments();
  startStudyingListener();
  startPaidCoursesListener();
  startCourseConfigListener();
});

function showAuth() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}

function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
}

async function doLogin() {
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('auth-err');
  err.textContent = '';
  btn.disabled = true;
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    await auth.signInWithPopup(provider);
  } catch(e) {
    const msgs = {
      'auth/popup-closed-by-user': 'أُغلق نافذة الدخول — حاول مرة ثانية',
      'auth/cancelled-popup-request': '',
      'auth/popup-blocked': 'المتصفح حجب النافذة — اسمح بـ Popups لهذا الموقع'
    };
    err.textContent = msgs[e.code] || e.message;
    btn.disabled = false;
  }
}

async function doLogout() {
  if (paymentsUnsubscribe) { paymentsUnsubscribe(); paymentsUnsubscribe = null; }
  if (studyingUnsubscribe) { studyingUnsubscribe(); studyingUnsubscribe = null; }
  if (usersUnsubscribe)       { usersUnsubscribe();       usersUnsubscribe       = null; }
  if (courseConfigUnsubscribe){ courseConfigUnsubscribe(); courseConfigUnsubscribe = null; }
  await auth.signOut();
  allPayments    = [];
  studyingCounts = {};
  paidCounts     = {};
  showAuth();
}

/* ── Load Payments (real-time listener) ─────────── */
function loadPayments() {
  // Tear down any previous listener first
  if (paymentsUnsubscribe) { paymentsUnsubscribe(); paymentsUnsubscribe = null; }

  document.getElementById('payments-container').innerHTML =
    '<div class="loading-state"><div class="spinner"></div><div>جاري الاتصال...</div></div>';

  paymentsUnsubscribe = db.collection('course_payments')
    .orderBy('createdAt', 'desc')
    .onSnapshot(function(snap) {
      allPayments = snap.docs.map(function(d) {
        return Object.assign({ _id: d.id }, d.data());
      });
      updateStats();
      buildDateNav(true);
      renderList();
      const now = new Date();
      document.getElementById('last-refresh').innerHTML =
        '<span class="live-dot"></span>مباشر — ' + now.toLocaleTimeString('ar-EG');
    }, function(e) {
      document.getElementById('payments-container').innerHTML =
        '<div class="empty-state"><div class="empty-ico">⚠️</div>' +
        '<div class="empty-title">خطأ في التحميل</div>' +
        '<div class="empty-desc">' + e.message + '</div></div>';
    });
}

/* ── Stats ──────────────────────────────────────── */
function updateStats() {
  const pending  = allPayments.filter(function(p){ return p.status === 'pending'; }).length;
  const approved = allPayments.filter(function(p){ return p.status === 'approved'; }).length;
  const rejected = allPayments.filter(function(p){ return p.status === 'rejected'; }).length;
  const revenue  = allPayments
    .filter(function(p){ return p.status === 'approved'; })
    .reduce(function(s, p){ return s + (p.amount || 0); }, 0);
  document.getElementById('stat-pending').textContent  = pending;
  document.getElementById('stat-approved').textContent = approved;
  document.getElementById('stat-rejected').textContent = rejected;
  document.getElementById('stat-revenue').textContent  = revenue + ' ج';
  updateEnrollments();
}

/* ── Studying Listener (academy_progress) ────────── */
function startStudyingListener() {
  if (studyingUnsubscribe) { studyingUnsubscribe(); studyingUnsubscribe = null; }
  studyingUnsubscribe = db.collection('academy_progress')
    .onSnapshot(function(snap) {
      studyingCounts = {};
      snap.docs.forEach(function(doc) {
        var data = doc.data();
        if (!data.courseId || !data.uid) return;
        var active = (data.d && data.d.length > 0) ||
                     (typeof data.fe === 'number' && data.fe >= 0);
        if (active) {
          if (!studyingCounts[data.courseId]) studyingCounts[data.courseId] = {};
          studyingCounts[data.courseId][data.uid] = true;
        }
      });
      updateEnrollments();
    }, function(e) { console.warn('academy_progress listener:', e.message); });
}

/* ── Paid Courses Listener (users.paidCourses) ────── */
function startPaidCoursesListener() {
  if (usersUnsubscribe) { usersUnsubscribe(); usersUnsubscribe = null; }
  usersUnsubscribe = db.collection('users')
    .onSnapshot(function(snap) {
      paidCounts = {};
      snap.docs.forEach(function(doc) {
        var data = doc.data();
        var uid  = doc.id;
        if (!data.paidCourses || !Array.isArray(data.paidCourses)) return;
        data.paidCourses.forEach(function(cid) {
          if (!paidCounts[cid]) paidCounts[cid] = {};
          paidCounts[cid][uid] = true;
        });
      });
      updateEnrollments();
    }, function(e) { console.warn('users listener:', e.message); });
}

/* ── Enrollments per Course (real-time) ─────────── */
function updateEnrollments() {
  var el = document.getElementById('course-enrollments');
  if (!el) return;

  // pending count from payments
  var pendingCount = {};
  allPayments.forEach(function(p) {
    if (p.courseId && p.status === 'pending')
      pendingCount[p.courseId] = (pendingCount[p.courseId] || 0) + 1;
  });

  el.innerHTML = Object.keys(COURSE_LABELS).map(function(cid) {
    var label    = COURSE_LABELS[cid];
    var isActive = !courseConfig[cid] || courseConfig[cid].active !== false;

    // UNION: paidCourses (users) + academy_progress (studying)
    var allUids = {};
    if (paidCounts[cid])    Object.keys(paidCounts[cid]).forEach(function(u)    { allUids[u] = true; });
    if (studyingCounts[cid]) Object.keys(studyingCounts[cid]).forEach(function(u) { allUids[u] = true; });

    var total = Object.keys(allUids).length;
    var paid  = paidCounts[cid] ? Object.keys(paidCounts[cid]).length : 0;
    var pend  = pendingCount[cid] || 0;

    var sub = [];
    if (paid) sub.push('✅ ' + paid + ' مشترك');
    if (pend) sub.push('⏳ ' + pend + ' معلّق');

    var toggleClick = isActive
      ? 'askPauseCourse(\'' + cid + '\')'
      : 'toggleCourse(\'' + cid + '\', true)';
    var toggleIcon  = (isActive ? IC.circ_g : IC.circ_r) + ' ' + (isActive ? 'نشط' : 'موقوف');

    return '<div class="course-enroll-row' + (isActive ? '' : ' paused-course') + '">' +
      '<div>' +
        '<div class="course-enroll-name">' + label + '</div>' +
        (sub.length ? '<div class="course-enroll-pending">' + sub.join(' · ') + '</div>' : '') +
      '</div>' +
      '<div style="flex-shrink:0;text-align:center">' +
        '<div class="course-enroll-count">' + total + '</div>' +
        '<button class="course-toggle-btn ' + (isActive ? 'active' : 'paused') + '" onclick="' + toggleClick + '">' + toggleIcon + '</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

/* ── Filter & Render ────────────────────────────── */
/* ── Date Navigator ───────────────────────── */
var MONTHS_AR = ['ينا','فبر','مار','أبر','ماي','يون','يول','أغس','سبت','أكت','نوف','ديس'];
var MONTHS_AR_FULL = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

/* scroll-vs-click guard for date nav */
var _navScrolling = false;
var _navScrollTimer = null;

function getPayDate(p) {
  if (!p.createdAt) return null;
  try {
    if (typeof p.createdAt.toDate === 'function') return p.createdAt.toDate();
    if (p.createdAt.seconds)  return new Date(p.createdAt.seconds * 1000);
    if (typeof p.createdAt === 'number') return new Date(p.createdAt);
    return new Date(p.createdAt);
  } catch(e) { return null; }
}

function buildDateNav(scrollToToday) {
  var el   = document.getElementById('date-nav');
  var wrap = el && el.parentElement;
  if (!el) return;

  // Attach scroll-detection listener once
  if (!wrap._navListenerAdded) {
    wrap._navListenerAdded = true;
    wrap.addEventListener('scroll', function() {
      _navScrolling = true;
      clearTimeout(_navScrollTimer);
      _navScrollTimer = setTimeout(function() { _navScrolling = false; }, 200);
    }, { passive: true });
  }

  var today = new Date();
  var html  = '';
  for (var i = 29; i >= 0; i--) {
    var d = new Date(today.getFullYear(), today.getMonth(), today.getDate() - i);
    var isToday    = (i === 0);
    var isSelected = currentDateFilter &&
      d.getFullYear() === currentDateFilter.getFullYear() &&
      d.getMonth()    === currentDateFilter.getMonth() &&
      d.getDate()     === currentDateFilter.getDate();
    var count = allPayments.filter(function(p) {
      var pd = getPayDate(p); if (!pd) return false;
      return pd.getFullYear() === d.getFullYear() &&
             pd.getMonth()    === d.getMonth() &&
             pd.getDate()     === d.getDate();
    }).length;
    var y = d.getFullYear(), m = d.getMonth(), day = d.getDate();
    html += '<button class="day-btn' +
      (isSelected ? ' selected' : '') + (isToday ? ' today' : '') +
      '" onclick="selectDate(' + y + ',' + m + ',' + day + ')" title="' + day + ' ' + MONTHS_AR_FULL[m] + ' ' + y + '">' +
      '<span class="day-num">' + day + '</span>' +
      '<span class="day-month">' + MONTHS_AR[m] + '</span>' +
      (count > 0
        ? '<span class="day-count">' + count + '</span>'
        : '<span class="day-dot"></span>') +
      '</button>';
  }
  el.innerHTML = html;
  // Scroll to today only on initial load (not on every rebuild)
  if (scrollToToday !== false) {
    setTimeout(function() { wrap.scrollLeft = wrap.scrollWidth; }, 30);
  }
}

function selectDate(y, m, d) {
  // Ignore if user was just scrolling the date strip
  if (_navScrolling) return;

  var clicked = new Date(y, m, d);
  if (currentDateFilter &&
      currentDateFilter.getFullYear() === y &&
      currentDateFilter.getMonth()    === m &&
      currentDateFilter.getDate()     === d) {
    currentDateFilter = null;
  } else {
    currentDateFilter = clicked;
  }
  buildDateNav(false); // false = don't jump scroll back to today
  updateDateLabel();
  renderList();
}

function clearDateFilter() {
  currentDateFilter = null;
  buildDateNav();
  updateDateLabel();
  renderList();
}

function updateDateLabel() {
  var el  = document.getElementById('date-active-label');
  var txt = document.getElementById('date-label-text');
  if (!el || !txt) return;
  if (!currentDateFilter) {
    el.classList.remove('on');
    return;
  }
  el.classList.add('on');
  txt.textContent = 'معاملات ' +
    currentDateFilter.getDate() + ' ' +
    MONTHS_AR_FULL[currentDateFilter.getMonth()] + ' ' +
    currentDateFilter.getFullYear();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.tab-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.filter === f);
  });
  renderList();
}

/* ── Daily Summary ─────────────────────────────── */
function renderDaySummary(dayList, date) {
  var el = document.getElementById('day-summary');
  if (!el) return;
  if (!date || !dayList.length) { el.style.display = 'none'; return; }

  var approved = dayList.filter(function(p){ return p.status === 'approved'; });
  var pending  = dayList.filter(function(p){ return p.status === 'pending';  });
  var rejected = dayList.filter(function(p){ return p.status === 'rejected'; });
  var revenue  = approved.reduce(function(sum,p){ return sum+(parseFloat(p.amount)||0); }, 0);
  var dayNames = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  var calSvg = '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="14" height="13" rx="2"/><line x1="3" y1="8" x2="17" y2="8"/><line x1="7" y1="2" x2="7" y2="5"/><line x1="13" y1="2" x2="13" y2="5"/></svg>';

  el.style.display = 'block';
  el.innerHTML =
    '<div class="day-summary-card">' +
      '<div class="day-summary-header">' +
        calSvg +
        '<div class="day-summary-title-txt">' +
          dayNames[date.getDay()] + '، ' + date.getDate() + ' ' +
          MONTHS_AR_FULL[date.getMonth()] + ' ' + date.getFullYear() +
        '</div>' +
      '</div>' +
      '<div class="day-summary-stats">' +
        '<div class="day-stat">' +
          '<div class="day-stat-val">' + dayList.length + '</div>' +
          '<div class="day-stat-lbl">إجمالي المعاملات</div>' +
        '</div>' +
        '<div class="day-stat approved-s">' +
          '<div class="day-stat-val">' + approved.length + '</div>' +
          '<div class="day-stat-lbl">مقبول</div>' +
        '</div>' +
        '<div class="day-stat pending-s">' +
          '<div class="day-stat-val">' + pending.length + '</div>' +
          '<div class="day-stat-lbl">معلّق</div>' +
        '</div>' +
        '<div class="day-stat rejected-s">' +
          '<div class="day-stat-val">' + rejected.length + '</div>' +
          '<div class="day-stat-lbl">مرفوض</div>' +
        '</div>' +
        '<div class="day-stat revenue-s">' +
          '<div class="day-stat-val">' + revenue.toFixed(0) + ' ج</div>' +
          '<div class="day-stat-lbl">إيرادات اليوم</div>' +
        '</div>' +
      '</div>' +
    '</div>';
}

function renderList() {
  const q = (document.getElementById('search-input').value || '').trim().toLowerCase();

  // Compute day list first (all statuses) for the summary panel
  var dayList = currentDateFilter ? allPayments.filter(function(p) {
    var pd = getPayDate(p); if (!pd) return false;
    return pd.getFullYear() === currentDateFilter.getFullYear() &&
           pd.getMonth()    === currentDateFilter.getMonth() &&
           pd.getDate()     === currentDateFilter.getDate();
  }) : [];
  renderDaySummary(dayList, currentDateFilter);

  let list = allPayments;
  if (currentFilter !== 'all') {
    list = list.filter(function(p){ return p.status === currentFilter; });
  }
  if (currentDateFilter) {
    list = list.filter(function(p) {
      var pd = getPayDate(p); if (!pd) return false;
      return pd.getFullYear() === currentDateFilter.getFullYear() &&
             pd.getMonth()    === currentDateFilter.getMonth() &&
             pd.getDate()     === currentDateFilter.getDate();
    });
  }
  if (q) {
    list = list.filter(function(p) {
      return (p.email||'').toLowerCase().includes(q) ||
             (p.phone||'').includes(q) ||
             (p.transactionRef||'').toLowerCase().includes(q) ||
             (p._id||'').toLowerCase().includes(q);
    });
  }

  const container = document.getElementById('payments-container');
  if (!list.length) {
    container.innerHTML =
      '<div class="empty-state">' +
      '<div class="empty-ico">' + (currentFilter==='pending'?'🎉':'📭') + '</div>' +
      '<div class="empty-title">' + (currentFilter==='pending' ? 'لا يوجد طلبات معلّقة' : 'لا توجد نتائج') + '</div>' +
      '<div class="empty-desc">' + (currentFilter==='pending' ? 'كل الطلبات تمت معالجتها!' : 'جرّب فلتر أو بحث مختلف') + '</div></div>';
    return;
  }

  container.innerHTML = '<div class="payments-list">' +
    list.map(function(p){ return buildCard(p); }).join('') +
  '</div>';
}

function buildCard(p) {
  const date = p.createdAt ? new Date(p.createdAt.toDate ? p.createdAt.toDate() : p.createdAt).toLocaleString('ar-EG') : '—';
  const courseLabel = COURSE_LABELS[p.courseId] || p.courseId || '—';
  const statusLabel = {pending:'⏳ قيد المراجعة', approved: p.suspended ? '⏸️ موقوف' : '✅ مفعّل', rejected:'❌ مرفوض'}[p.status] || p.status;
  const waLink = p.phone ? 'https://wa.me/2' + p.phone.replace(/^0/, '') : null;

  const actions = p.status === 'pending' ?
    '<button class="action-btn approve" onclick="askApprove(\'' + p._id + '\',\'' + (p.uid||'') + '\',\'' + (p.courseId||'') + '\')">' + IC.check + ' قبول وتفعيل</button>' +
    '<button class="action-btn reject"  onclick="askReject(\''  + p._id + '\',\'' + (p.uid||'') + '\')">' + IC.x + ' رفض</button>' +
    (waLink ? '<a class="action-btn wa" href="' + waLink + '" target="_blank" rel="noopener">' + IC.wa + ' واتساب</a>' : '')
    :
    '<span class="action-done">' + statusLabel + (p.rejectionNote ? ' — ' + p.rejectionNote : '') + '</span>' +
    (p.status === 'approved' ?
      (p.suspended
        ? '<button class="action-btn unsuspend" onclick="doUnsuspend(\'' + p._id + '\',\'' + (p.uid||'') + '\',\'' + (p.courseId||'') + '\')">' + IC.unlock + ' رفع الإيقاف</button>'
        : '<button class="action-btn suspend"   onclick="askSuspend(\''   + p._id + '\',\'' + (p.uid||'') + '\',\'' + (p.courseId||'') + '\')">' + IC.pause + ' إيقاف</button>'
      ) : '') +
    (p.status === 'approved' ? '<button class="action-btn delete" onclick="askDelete(\'' + p._id + '\',\'' + (p.uid||'') + '\',\'' + (p.courseId||'') + '\')">' + IC.trash + ' حذف</button>' : '') +
    (waLink ? '<a class="action-btn wa" href="' + waLink + '" target="_blank" rel="noopener">' + IC.wa + ' واتساب</a>' : '');

  return '<div class="pay-card ' + (p.status||'') + '">' +
    '<div class="pay-card-top">' +
      '<div class="pay-card-info">' +
        '<div class="pay-email">' + (p.email || 'لا يوجد إيميل') + '</div>' +
        '<div class="pay-date">📅 ' + date + '</div>' +
      '</div>' +
      '<span class="status-badge ' + (p.status||'') + '">' + statusLabel + '</span>' +
    '</div>' +
    '<div class="pay-card-details">' +
      '<div class="detail-item"><div class="detail-lbl">الهاتف</div><div class="detail-val phone-val">' + (p.phone||'—') + '</div></div>' +
      '<div class="detail-item"><div class="detail-lbl">الرقم المرجعي</div><div class="detail-val">' + (p.transactionRef||'—') + '</div></div>' +
      '<div class="detail-item"><div class="detail-lbl">الدورة</div><div class="detail-val">' + courseLabel + '</div></div>' +
      '<div class="detail-item"><div class="detail-lbl">المبلغ</div><div class="detail-val">' + (p.amount||'—') + ' جنيه</div></div>' +
      '<div class="detail-item" style="word-break:break-all"><div class="detail-lbl">رقم الطلب</div><div class="detail-val" style="font-size:11px">' + p._id + '</div></div>' +
    '</div>' +
    '<div class="pay-card-actions">' + actions + '</div>' +
  '</div>';
}

/* ── Actions ────────────────────────────────────── */
function askApprove(docId, uid, courseId) {
  pendingAction = { type: 'approve', docId, uid, courseId };
  document.getElementById('confirm-ico').textContent   = '✅';
  document.getElementById('confirm-title').textContent = 'تأكيد القبول والتفعيل';
  document.getElementById('confirm-msg').textContent   = 'سيتم تفعيل الدورة لهذا المستخدم فوراً. هل تأكدت من التحقق من التحويل في تطبيق فودافون كاش؟';
  document.getElementById('confirm-note').style.display = 'none';
  document.getElementById('confirm-ok-btn').textContent = '✅ قبول وتفعيل';
  document.getElementById('confirm-ok-btn').style.background = 'var(--approved)';
  document.getElementById('confirm-overlay').classList.add('on');
}

function askReject(docId, uid) {
  pendingAction = { type: 'reject', docId, uid };
  document.getElementById('confirm-ico').textContent   = '❌';
  document.getElementById('confirm-title').textContent = 'رفض الطلب';
  document.getElementById('confirm-msg').textContent   = 'هل تريد رفض هذا الطلب؟ سيتم إشعار المستخدم بالرفض.';
  document.getElementById('confirm-note').style.display = 'block';
  document.getElementById('confirm-note').value = '';
  document.getElementById('confirm-ok-btn').textContent = '❌ رفض الطلب';
  document.getElementById('confirm-ok-btn').style.background = 'var(--rejected)';
  document.getElementById('confirm-overlay').classList.add('on');
}

function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('on');
  pendingAction = null;
  document.getElementById('confirm-ok-btn').disabled = false;
}

async function confirmAction() {
  if (!pendingAction) return;
  const btn = document.getElementById('confirm-ok-btn');
  btn.disabled = true; btn.textContent = 'جاري التنفيذ...';

  try {
    if (pendingAction.type === 'approve') {
      await doApprove(pendingAction.docId, pendingAction.uid, pendingAction.courseId);
    } else if (pendingAction.type === 'delete') {
      await doDelete(pendingAction.docId, pendingAction.uid, pendingAction.courseId);
    } else if (pendingAction.type === 'suspend') {
      await doSuspend(pendingAction.docId, pendingAction.uid, pendingAction.courseId);
    } else if (pendingAction.type === 'pause-course') {
      await toggleCourse(pendingAction.cid, false);
    } else {
      const note = (document.getElementById('confirm-note').value || '').trim();
      await doReject(pendingAction.docId, note);
    }
    closeConfirm();
  } catch(e) {
    showToast('خطأ: ' + e.message, 'err');
    btn.disabled = false;
    const labels = { approve: '✅ قبول وتفعيل', reject: '❌ رفض الطلب', delete: '🗑️ حذف نهائياً' };
    btn.textContent = labels[pendingAction.type] || 'تأكيد';
  }
}

async function doApprove(docId, uid, courseId) {
  const batch = db.batch();

  // 1. Update payment doc status
  batch.update(db.collection('course_payments').doc(docId), {
    status:     'approved',
    approvedAt: firebase.firestore.FieldValue.serverTimestamp(),
    approvedBy: auth.currentUser ? auth.currentUser.uid : 'admin'
  });

  // 2. Add course to user's paidCourses
  if (uid && courseId) {
    batch.set(
      db.collection('users').doc(uid),
      { paidCourses: firebase.firestore.FieldValue.arrayUnion(courseId) },
      { merge: true }
    );
  }

  await batch.commit();

  // Update local state
  const idx = allPayments.findIndex(function(p){ return p._id === docId; });
  if (idx > -1) { allPayments[idx].status = 'approved'; }
  updateStats(); renderList();
  showToast('✅ تم التفعيل بنجاح — الكورس أصبح متاحاً للمستخدم', 'ok');
}

async function doReject(docId, note) {
  await db.collection('course_payments').doc(docId).update({
    status:       'rejected',
    rejectedAt:   firebase.firestore.FieldValue.serverTimestamp(),
    rejectedBy:   auth.currentUser ? auth.currentUser.uid : 'admin',
    rejectionNote: note || ''
  });

  const idx = allPayments.findIndex(function(p){ return p._id === docId; });
  if (idx > -1) {
    allPayments[idx].status = 'rejected';
    allPayments[idx].rejectionNote = note || '';
  }
  updateStats(); renderList();
  showToast('❌ تم رفض الطلب', 'ok');
}

/* ── Per-Student Suspension ─────────────────────── */
function askSuspend(docId, uid, courseId) {
  pendingAction = { type: 'suspend', docId, uid, courseId };
  document.getElementById('confirm-ico').textContent   = String.fromCodePoint(0x23F8, 0xFE0F);
  document.getElementById('confirm-title').textContent = 'إيقاف الطالب من الدورة';
  document.getElementById('confirm-msg').textContent   =
    'سيتم إيقاف وصول هذا الطالب إلى دورة "' + (COURSE_LABELS[courseId] || courseId) +
    '" فوراً. يمكنك رفع الإيقاف في أي وقت.';
  document.getElementById('confirm-note').style.display = 'none';
  document.getElementById('confirm-ok-btn').textContent = String.fromCodePoint(0x23F8, 0xFE0F) + ' إيقاف الطالب';
  document.getElementById('confirm-ok-btn').style.background = '#92400e';
  document.getElementById('confirm-overlay').classList.add('on');
}

async function doSuspend(docId, uid, courseId) {
  const batch = db.batch();
  batch.update(db.collection('course_payments').doc(docId), { suspended: true });
  if (uid && courseId) {
    batch.update(db.collection('users').doc(uid),
      { suspendedCourses: firebase.firestore.FieldValue.arrayUnion(courseId) });
  }
  await batch.commit();
  const idx = allPayments.findIndex(function(p) { return p._id === docId; });
  if (idx > -1) allPayments[idx].suspended = true;
  updateStats(); renderList();
  showToast(String.fromCodePoint(0x23F8, 0xFE0F) + ' تم إيقاف الطالب من الدورة', 'ok');
}

async function doUnsuspend(docId, uid, courseId) {
  const batch = db.batch();
  batch.update(db.collection('course_payments').doc(docId), { suspended: false });
  if (uid && courseId) {
    batch.update(db.collection('users').doc(uid),
      { suspendedCourses: firebase.firestore.FieldValue.arrayRemove(courseId) });
  }
  await batch.commit();
  const idx = allPayments.findIndex(function(p) { return p._id === docId; });
  if (idx > -1) allPayments[idx].suspended = false;
  updateStats(); renderList();
  showToast(String.fromCodePoint(0x1F513) + ' تم رفع الإيقاف عن الطالب', 'ok');
}

/* ── Course Config Listener ─────────────────────── */
function startCourseConfigListener() {
  if (courseConfigUnsubscribe) { courseConfigUnsubscribe(); courseConfigUnsubscribe = null; }
  courseConfigUnsubscribe = db.collection('course_config')
    .onSnapshot(function(snap) {
      courseConfig = {};
      snap.docs.forEach(function(doc) { courseConfig[doc.id] = doc.data(); });
      updateEnrollments();
    }, function(e) { console.warn('course_config listener:', e.message); });
}

function askPauseCourse(cid) {
  pendingAction = { type: 'pause-course', cid: cid };
  var lockIcon = String.fromCodePoint(0x1F512);
  document.getElementById('confirm-ico').textContent   = lockIcon;
  document.getElementById('confirm-title').textContent = 'إيقاف الدورة مؤقتاً';
  document.getElementById('confirm-msg').textContent   =
    'سيتم إيقاف الوصول إلى دورة "' + (COURSE_LABELS[cid] || cid) +
    '" فوراً لجميع الطلاب. يمكنك إعادة تفعيلها في أي وقت.';
  document.getElementById('confirm-note').style.display = 'none';
  document.getElementById('confirm-ok-btn').textContent = lockIcon + ' إيقاف الدورة';
  document.getElementById('confirm-ok-btn').style.background = '#b45309';
  document.getElementById('confirm-overlay').classList.add('on');
}

async function toggleCourse(cid, makeActive) {
  try {
    await db.collection('course_config').doc(cid).set({ active: makeActive }, { merge: true });
    var icon = String.fromCodePoint(makeActive ? 0x1F513 : 0x1F512);
    showToast(icon + ' ' + (makeActive ? 'تم تفعيل الدورة' : 'تم إيقاف الدورة مؤقتاً'), 'ok');
  } catch(e) {
    showToast('خطأ: ' + e.message, 'err');
  }
}

/* ── Delete Approved Payment ────────────────────── */
function askDelete(docId, uid, courseId) {
  pendingAction = { type: 'delete', docId, uid, courseId };
  document.getElementById('confirm-ico').textContent   = '🗑️';
  document.getElementById('confirm-title').textContent = 'حذف سجل الدفعة';
  document.getElementById('confirm-msg').textContent   =
    'سيتم حذف سجل الدفع من الإيرادات نهائياً. اشتراك المستخدم في الدورة سيبقى كما هو.';
  document.getElementById('confirm-note').style.display = 'none';
  document.getElementById('confirm-ok-btn').textContent = '🗑️ حذف نهائياً';
  document.getElementById('confirm-ok-btn').style.background = '#991b1b';
  document.getElementById('confirm-overlay').classList.add('on');
}

async function doDelete(docId, uid, courseId) {
  // Delete payment document only — course access remains intact
  await db.collection('course_payments').doc(docId).delete();

  // Remove from local state immediately
  allPayments = allPayments.filter(function(p) { return p._id !== docId; });
  updateStats();
  renderList();
  showToast('🗑️ تم حذف سجل الدفعة', 'ok');
}

/* ── Toast ──────────────────────────────────────── */
function showToast(msg, type) {
  const wrap = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = 'toast ' + (type || '');
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(function(){ t.remove(); }, 3500);
}
